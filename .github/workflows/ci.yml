name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile check (every .py file)
        run: python -m py_compile $(git ls-files '*.py')

      - name: Auto Cleaner eval suite (deterministic, no network/API key needed)
        run: python eval/autocleaner_eval.py
